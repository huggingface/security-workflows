---
name: Update Major Version Tag

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: 'Full version (ex: v1.0.1)'
        required: true
        type: string
      major_tag:
        description: 'Tag major version to create (ex: v1)'
        required: true
        type: string

jobs:
  update-major-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      
      - name: Check if source tag exists
        env:
          SOURCE_TAG: ${{ inputs.source_tag }}
        run: |
          if ! git rev-parse "$SOURCE_TAG" >/dev/null 2>&1; then
            echo "Tag $SOURCE_TAG does not exist."
            exit 1
          fi
          echo "Source tag found: $SOURCE_TAG"
      
      - name: Delete existing major tag (if exists)
        env:
          MAJOR_TAG: ${{ inputs.major_tag }}
        run: |
          if git rev-parse "$MAJOR_TAG" >/dev/null 2>&1; then
            git push origin :refs/tags/$MAJOR_TAG || true
            echo "Tag $MAJOR_TAG deleted"
          fi
      
      - name: Create and push major tag
        env:
          MAJOR_TAG: ${{ inputs.major_tag }}
          SOURCE_TAG: ${{ inputs.source_tag }}
        run: |
          git tag -f $MAJOR_TAG $SOURCE_TAG
          git push origin $MAJOR_TAG --force
          echo "Tag $MAJOR_TAG has been created and redirect to $SOURCE_TAG"
