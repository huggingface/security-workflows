# add comment
---
name: Reusable Octoscan Workflow Security Analysis

on:
  workflow_call:
    inputs:
      target:
        description: 'Target directory to scan'
        required: false
        type: string
        default: '.github/workflows'
      disable_rules:
        description: 'Rules to disable (comma-separated)'
        required: false
        type: string
        default: 'shellcheck,local-action,runner-label'
      filter_triggers:
        description: 'Filter by trigger type (external, allnopr, or empty for all)'
        required: false
        type: string
        default: ''
      generate_summary:
        description: 'Generate detailed summary'
        required: false
        type: boolean
        default: true

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  octoscan:
    name: Scan Workflows
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Run Octoscan
        id: octoscan
        uses: synacktiv/action-octoscan@6b1cf2343893dfb9e5f75652388bd2dc83f456b0 # v1.0.0
        with:
          disable_rules: ${{ inputs.disable_rules }}
          filter_triggers: ${{ inputs.filter_triggers }}
      
      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3.35.5
        with:
          sarif_file: "${{ steps.octoscan.outputs.sarif_output }}"
          category: octoscan
      
      - name: Upload results artifact
        if: always() && inputs.generate_summary
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: octoscan-results
          path: results.json
          retention-days: 30
          if-no-files-found: ignore
